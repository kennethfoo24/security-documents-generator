# DO NOT commit real credentials. Either:
# 1. Replace placeholder values with base64-encoded secrets and apply once, or
# 2. Use: kubectl create secret generic sec-gen-credentials \
#      --from-literal=ELASTIC_API_KEY=<your-key> \
#      --from-literal=KIBANA_API_KEY=<your-key>
apiVersion: v1
kind: Secret
metadata:
  name: sec-gen-credentials
  namespace: default
type: Opaque
data:
  # base64-encode your values: echo -n 'your-key' | base64
  ELASTIC_API_KEY: REPLACE_WITH_BASE64_VALUE
  KIBANA_API_KEY: REPLACE_WITH_BASE64_VALUE
