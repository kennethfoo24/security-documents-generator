apiVersion: apps/v1
kind: Deployment
metadata:
  name: sec-gen-runner
  namespace: default
  labels:
    app: sec-gen-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sec-gen-runner
  template:
    metadata:
      labels:
        app: sec-gen-runner
    spec:
      containers:
        - name: sec-gen-runner
          image: kennethfoo24/security-generator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: health
          envFrom:
            - configMapRef:
                name: sec-gen-config
            - secretRef:
                name: sec-gen-credentials
          volumeMounts:
            - name: scenario
              mountPath: /config
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: scenario
          configMap:
            name: sec-gen-config
            items:
              - key: scenario.json
                path: scenario.json
      terminationGracePeriodSeconds: 30
